# SELIX CI/CD Pipeline v4.0
# Última atualização: 2026-06-01

name: SELIX CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  SELIX_API_KEYS: 'test_key_123,ci_test_key'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock pydantic

      - name: Run Python core (Selic calculation)
        run: python src/selix/core.py

      - name: Run Z3 proof
        run: python src/selix/z3_proof.py || echo "Z3 proof skipped (optional)"

      - name: Start API in background
        run: |
          export PYTHONPATH=$PWD
          export REQUESTS_CA_BUNDLE=$PWD/venv/lib/python3.13/site-packages/certifi/cacert.pem
          python -m src.api.main_v4 &
          sleep 5
          curl --retry 5 --retry-delay 1 --retry-connrefused http://localhost:5000/v1/health

      - name: Run all tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov=confidence \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=100

      - name: Upload coverage report (optional)
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Generate validation certificate
        run: |
          mkdir -p certs
          echo "{\"status\":\"validated\",\"date\":\"$(date -Iseconds)\"}" > certs/latest.json

  deploy-docs:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy documentation to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
