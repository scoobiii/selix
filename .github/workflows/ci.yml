name: SELIX CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest z3-solver
    
    - name: Run Python core
      run: python src/selix/core.py
    
    - name: Run Z3 proof
      run: python src/selix/z3_proof.py || echo "Z3 proof skipped"
    
    - name: Run unit tests
      run: pytest tests/ -v
    
    - name: Generate certificate
      run: |
        echo "{\"status\":\"validated\",\"date\":\"$(date -Iseconds)\"}" > certs/latest.json

  deploy-docs:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        publish_branch: gh-pages
