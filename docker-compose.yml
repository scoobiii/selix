version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SELIX_DB_PATH=/app/selix.db
      - OILPRICEAPI_KEY=${OILPRICEAPI_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python src/api/main_v4.py
    restart: unless-stopped

  worker:
    build: .
    environment:
      - SELIX_DB_PATH=/app/selix.db
      - OILPRICEAPI_KEY=${OILPRICEAPI_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python src/selix/worker_v4.py
    restart: unless-stopped

  bot:
    build: .
    environment:
      - SELIX_DB_PATH=/app/selix.db
      - BLUESKY_USERNAME=${BLUESKY_USERNAME}
      - BLUESKY_APP_PASSWORD=${BLUESKY_APP_PASSWORD}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python agents/bluesky_bot/post_inteligente_v4.py
    restart: unless-stopped
