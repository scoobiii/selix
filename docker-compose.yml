version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SELIX_DB_PATH=/data/selix.db
      - OILPRICEAPI_KEY=${OILPRICEAPI_KEY}
    volumes:
      - ./data:/data
    command: python src/api/main_v3.py
    restart: unless-stopped

  worker:
    build: .
    environment:
      - SELIX_DB_PATH=/data/selix.db
      - OILPRICEAPI_KEY=${OILPRICEAPI_KEY}
    volumes:
      - ./data:/data
    command: python src/selix/worker_real.py
    restart: unless-stopped

  cron:
    build: .
    volumes:
      - ./data:/data
      - ./cron_tasks:/etc/cron.d/selix
    entrypoint: |
      sh -c "crontab /etc/cron.d/selix && crond -f -l 2"
    depends_on:
      - api
