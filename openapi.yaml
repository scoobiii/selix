openapi: 3.0.0
info:
  title: SELIX API
  version: 4.0.0
paths:
  /v1/health:
    get:
      summary: Health check
      responses:
        200:
          description: OK
  /v1/selic:
    get:
      summary: Selic atual
      parameters:
        - name: X-API-Key
          in: header
          required: true
      responses:
        200:
          description: Taxa Selic
  /v1/commodities:
    get:
      summary: Preços de commodities
      parameters:
        - name: X-API-Key
          in: header
          required: true
      responses:
        200:
          description: Lista de commodities
